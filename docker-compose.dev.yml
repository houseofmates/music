version: '3.8'

services:
  backend:
    build: ./backend
    container_name: music-backend-dev
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - /mnt/nextcloud/house/files/media/music:/music
      - ./backend/data:/app/data
    environment:
      - DATABASE_URL=sqlite:///./data/music.db
      - MUSIC_DIR=/music
      - DEBUG=True
      - CORS_ORIGINS=http://localhost:3006,http://localhost:5173
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - music-network

  file-watcher:
    build: ./backend
    container_name: music-file-watcher-dev
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    command: python file_watcher.py
    volumes:
      - ./backend:/app
      - /mnt/nextcloud/house/files/media/music:/music
      - ./backend/data:/app/data
    environment:
      - DATABASE_URL=sqlite:///./data/music.db
      - MUSIC_DIR=/music
    depends_on:
      - backend
    networks:
      - music-network

networks:
  music-network:
    driver: bridge

# note: for development, run frontend locally with 'npm run dev'
# the frontend vite dev server proxies /api to localhost:8000
