# Music App - Nginx Reverse Proxy Configuration
# 
# Place this file in: /etc/nginx/sites-available/music.conf
# Create symlink: sudo ln -s /etc/nginx/sites-available/music.conf /etc/nginx/sites-enabled/
# Test config: sudo nginx -t
# Reload: sudo systemctl reload nginx

# Upstream backends
upstream music_frontend {
    server localhost:3000;
}

upstream music_backend {
    server localhost:8000;
}

# Proxy cache configuration
proxy_cache_path /var/cache/nginx/music levels=1:2 keys_zone=music_cache:10m max_size=1g inactive=24h use_temp_path=off;

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=music_api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=music_stream:10m rate=5r/s;

# HTTP Server
server {
    listen 80;
    listen [::]:80;
    server_name music.houseofmates.space;  # Your domain

    # Redirect to HTTPS (optional, uncomment when SSL is configured)
    # return 301 https://$server_name$request_uri;

    # Or serve directly over HTTP
    
    # Frontend
    location / {
        proxy_pass http://music_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # WebSocket support
        proxy_read_timeout 86400;
    }

    # Backend API with rate limiting
    location /api {
        # Rate limit API requests
        limit_req zone=music_api burst=20 nodelay;

        proxy_pass http://music_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Increase timeouts for long-running requests (streaming)
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
    }



    # Static assets caching - serve from CDN if configured, otherwise from frontend
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        # Check for CDN environment variable
        set $cdn_url $CDN_URL;

        if ($cdn_url != "") {
            # Rewrite to CDN URL
            rewrite ^(.*)$ $cdn_url$1 break;
            proxy_pass $cdn_url;
        }

        # Fallback to frontend if no CDN
        proxy_pass http://music_frontend;

        # Add strong caching headers
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Cache-Status $upstream_cache_status;
    }

    # Audio streaming - optimized for CDN delivery
    location ~ ^/api/tracks/\d+/stream {
        # Rate limit streaming requests (lower rate for bandwidth control)
        limit_req zone=music_stream burst=10 nodelay;

        proxy_pass http://music_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Disable buffering for streaming
        proxy_buffering off;
        proxy_cache off;

        # Support range requests (seeking)
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;

        # Long timeout for streaming
        proxy_read_timeout 3600;

        # Add cache headers for transcoded content
        add_header Cache-Control "public, max-age=31536000" always;
        add_header Accept-Ranges "bytes" always;
    }

    # Metadata preload caching
    location ~ ^/api/tracks/\d+/preload {
        proxy_pass http://music_backend;

        # Cache metadata for 1 hour
        proxy_cache music_cache;
        proxy_cache_valid 200 1h;
        proxy_cache_key "$scheme$request_method$host$request_uri";
        add_header X-Cache-Status $upstream_cache_status;
    }

    # Frontend fallback - proxy to frontend for all other requests
    location @frontend {
        proxy_pass http://music_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;

    # Max upload size (for future features)
    client_max_body_size 100M;
}

