<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#050505" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: blob:; media-src 'self' data: blob: https:; connect-src 'self' https: http:; font-src 'self' data:;" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <link rel="icon" type="image/png" href="/src/assets/favicon.png" />
    <link rel="preconnect" href="https://music.houseofmates.space" />
    <link rel="dns-prefetch" href="https://music.houseofmates.space" />
    <title>music</title>

  <body style="margin:0;background:#050505;">
    <div id="root">
      <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#050505;">
        <div style="width:36px;height:36px;border:3px solid rgba(255,255,255,0.1);border-top-color:#d4a843;border-radius:50%;animation:sp .7s linear infinite;"></div>
      </div>
      <style>@keyframes sp{to{transform:rotate(360deg)}}</style>
    </div>
    <script>
      // Only load cordova.js when running inside Capacitor/Cordova (not Electron)
      if (typeof window !== 'undefined' && (window.Capacitor || window.cordova)) {
        document.write('<script src="cordova.js"><\/script>');
      }
    </script>
    <script type="module" src="/src/main.jsx"></script>
